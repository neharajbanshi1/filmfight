<!DOCTYPE html>
<html lang="en" class="bg-zinc-900 text-zinc-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmFight — {% block title %}Compare Letterboxd Profiles{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: {
            film: { 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed' }
        } } } }
    </script>
</head>
<body class="min-h-screen flex flex-col">
    <header class="border-b border-zinc-700 px-6 py-4">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <a href="{% url 'analysis:home' %}" class="text-2xl font-bold tracking-tight text-film-400">
                🎬 FilmFight
            </a>
            <nav class="space-x-4 text-sm text-zinc-400">
                <a href="{% url 'analysis:home' %}" class="hover:text-white">Home</a>
            </nav>
        </div>
    </header>

    <main class="flex-1 max-w-5xl mx-auto w-full px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-zinc-700 text-center text-xs text-zinc-600 py-4">
        FilmFight — built for learning, not for seriousness.
    </footer>
</body>
</html>
